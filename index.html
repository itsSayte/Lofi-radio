<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Live</title>
    <link rel="stylesheet" href="/src/css/radio.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<body>



<main class="content-wrapper">

    <div class="text-header">
        <h1>Radio Jazz</h1>
        <p>Diffusion en direct</p>
    </div>

    <div class="player">

        <!-- Bouton Play / Pause -->
        <button id="playBtn" class="btn">
            <i class="fa-solid fa-play" style="color:white;"></i>
        </button>


        <!-- Volume -->
        <div class="volume-container">
            <input id="volume" type="range" min="0" max="1" step="0.01" value="1">
            <span id="volume-value">100%</span>
        </div>

    </div>
    <a href="https://github.com/itsSayte/Lofi-radio" target="_blank" class="social-link">
        <i class="fa-brands fa-github"></i>
    </a>
</main>

<!-- Audio -->
 <!-- Audio source https://www.radiorsj.be/ -->
<audio id="radio" src="https://stream.srg-ssr.ch/m/rsj/mp3_128"></audio>

<!-- JS à la fin = IMPORTANT -->
<script src="/src/js/radio.js"></script>

</body>
</html>
